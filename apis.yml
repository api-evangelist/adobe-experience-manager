aid: adobe-experience-manager
name: Adobe Experience Manager
description: >-
  Adobe Experience Manager (AEM) is an enterprise content management solution
  for building websites, mobile apps, and forms, combining a digital asset
  management system, content fragment authoring, and adaptive forms in a
  single platform delivered as a cloud service. AEM provides REST APIs,
  GraphQL endpoints, and Java/JavaScript SDKs for content delivery, authoring,
  asset management, and infrastructure operations. Authentication for AEM as
  a Cloud Service uses Adobe IMS OAuth 2.0 service tokens.
type: Index
